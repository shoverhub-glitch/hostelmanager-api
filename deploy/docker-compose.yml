version: '3.8'
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app
    depends_on:
      - mongo
    networks:
      - api_net
  mongo:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - api_net
volumes:
  mongo_data:
networks:
  api_net:
