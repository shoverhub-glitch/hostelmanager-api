user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name vcardapi.shoverhub.com;
        return 301 https://$host$request_uri;
    }

    # Deny all other hosts on HTTP
    server {
        listen 80 default_server;
        return 444;
    }

    # HTTPS server for your domain
    server {
        listen 443 ssl http2;
        server_name vcardapi.shoverhub.com;

        ssl_certificate     /etc/ssl/certs/your_cert.crt;   # <-- Replace with your cert path
        ssl_certificate_key /etc/ssl/private/your_key.key;  # <-- Replace with your key path
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Only allow GET, POST, OPTIONS
        if ($request_method !~ ^(GET|POST|OPTIONS)$ ) {
            return 405;
        }

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Deny all other hosts on HTTPS
    server {
        listen 443 ssl http2 default_server;
        return 444;
    }
}
